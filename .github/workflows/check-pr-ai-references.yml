name: Block AI tool references in PRs

on:
  pull_request:
    types: [opened, edited, synchronize]
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]

jobs:
  check-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title and body
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          PATTERN='(claude|claude[- ]?code|openai[- ]?codex|anthropic|co-authored-by:.*(claude|openai))'
          if echo "$PR_TITLE" | grep -qiE "$PATTERN"; then
            echo "::error::PR title contains a forbidden AI tool reference."
            exit 1
          fi
          if echo "$PR_BODY" | grep -qiE "$PATTERN"; then
            echo "::error::PR description contains a forbidden AI tool reference."
            exit 1
          fi
          echo "PR title and body are clean."

      - name: Check PR comment
        if: github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment'
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          PATTERN='(claude|claude[- ]?code|openai[- ]?codex|anthropic|co-authored-by:.*(claude|openai))'
          if echo "$COMMENT_BODY" | grep -qiE "$PATTERN"; then
            echo "::error::Comment contains a forbidden AI tool reference."
            exit 1
          fi
          echo "Comment is clean."
